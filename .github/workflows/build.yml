# Author: zhangqi

name: build

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            archive: ws-net-linux-${{ github.ref_type == 'tag' && github.ref_name || github.sha }}.tar.gz
          - os: windows-latest
            platform: windows
            archive: ws-net-windows-${{ github.ref_type == 'tag' && github.ref_name || github.sha }}.zip
    steps:
      - uses: actions/checkout@v5

      - name: Setup toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Build
        run: cargo build --workspace --release

      - name: Prepare dist linux
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          cp target/release/ws-net-gateway dist/
          cp target/release/ws-net-access dist/
          cp gateway.example.toml dist/
          cp access.example.toml dist/
        shell: bash

      - name: Prepare dist windows
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target/release/ws-net-gateway.exe dist/
          Copy-Item target/release/ws-net-access.exe dist/
          Copy-Item gateway.example.toml dist/
          Copy-Item access.example.toml dist/
        shell: pwsh

      - name: Package dist linux
        if: runner.os == 'Linux'
        run: tar -czf ${{ matrix.archive }} -C dist .
        shell: bash

      - name: Package dist windows
        if: runner.os == 'Windows'
        run: Compress-Archive -Path dist/* -DestinationPath ${{ matrix.archive }}
        shell: pwsh

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: ws-net-${{ matrix.platform }}
          path: ${{ matrix.archive }}
          if-no-files-found: error

  release:
    name: upload release assets
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Upload dist to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
