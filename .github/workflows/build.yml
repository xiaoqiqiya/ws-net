# Author: zhangqi

name: build

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: build linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Build
        run: cargo build --workspace --release
        shell: bash

      - name: Prepare dist
        run: |
          mkdir -p dist
          cp target/release/ws-net-gateway dist/
          cp target/release/ws-net-access dist/
          cp gateway.example.toml dist/
          cp access.example.toml dist/
        shell: bash

      - name: Package dist
        run: tar -czf ws-net-linux-${GITHUB_REF_NAME}.tar.gz -C dist .
        shell: bash

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: ws-net-linux
          path: ws-net-linux-${{ github.ref_name }}.tar.gz
          if-no-files-found: error

      - name: Upload dist to GitHub Releases
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ws-net-linux-${{ github.ref_name }}.tar.gz
          generate_release_notes: true
