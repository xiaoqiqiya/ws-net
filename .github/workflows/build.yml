name: build

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    name: build linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Build
        run: cargo build --workspace --release
        shell: bash

      - name: Prepare dist
        run: |
          mkdir -p dist
          cp target/release/ws-net-gateway dist/
          cp target/release/ws-net-access dist/
          cp gateway.example.toml dist/
          cp access.example.toml dist/
        shell: bash

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: ws-net-linux
          path: dist/
          if-no-files-found: error
